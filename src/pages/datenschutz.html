<!DOCTYPE html>
<html lang="{{lang}}" dir="{{dir}}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{datenschutz_title}} – {{meta_title}}</title>
  <link rel="canonical" href="https://aktionstage.berlin{{canonical}}">
  {{alternate_links}}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="bg-white text-gray-900 antialiased">

  {{> header}}

  <section class="relative pt-32 pb-12 md:pt-40 md:pb-16 bg-gradient-to-br from-primary via-primary-light to-primary-dark">
    <div class="relative z-10 text-center px-4">
      <h1 class="text-3xl md:text-4xl font-bold text-white">{{datenschutz_title}}</h1>
    </div>
  </section>

  <section class="section-padding bg-white">
    <div class="max-w-3xl mx-auto prose prose-gray">
      {{datenschutz_text}}
    </div>
  </section>

  {{> footer}}

  <script src="/js/main.js"></script>
</body>
</html>
